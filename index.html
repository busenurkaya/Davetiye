<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buse Nur & Furkan Davetiyesi</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #f7f3ee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
    }

    .envelope {
      width: 320px;
      height: 210px;
      background: #e8dfd2;
      border-radius: 14px;
      position: relative;
      cursor: pointer;
      margin: 0 auto;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 105px;
      background: #d8ccbd;
      transform-origin: top;
      transition: transform 1s ease;
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      z-index: 2;
    }

    .letter {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 85%;
      height: 75%;
      background: #fff;
      border-radius: 10px 10px 0 0;
      transition: transform 1s ease;
      z-index: 1;
    }

    .seal {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #b97b84;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      z-index: 3;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      transition: opacity 0.4s ease;
    }

    .envelope.open .top {
      transform: rotateX(180deg);
    }

    .envelope.open .letter {
      transform: translateX(-50%) translateY(-55px);
    }

    .envelope.open .seal {
      opacity: 0;
    }

    .note {
      margin-top: 14px;
      color: #7f756c;
      font-size: 14px;
    }

    .card {
      display: none;
      margin-top: 28px;
      width: 360px;
      max-width: calc(100vw - 32px);
      background: white;
      border-radius: 20px;
      padding: 28px 22px;
      box-shadow: 0 14px 35px rgba(0,0,0,0.10);
    }

    .card.show {
      display: block;
    }

    h1 {
      margin: 0 0 10px;
      color: #355c4b;
      font-weight: 400;
      font-size: 38px;
      line-height: 1.2;
    }

    .sub {
      color: #b08b52;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .details {
      background: #f8f5f0;
      border-radius: 16px;
      padding: 16px;
      margin: 20px 0;
      line-height: 1.8;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 18px;
    }

    .box {
      background: #faf7f2;
      border: 1px solid #e8dccb;
      border-radius: 14px;
      padding: 12px 6px;
    }

    .box strong {
      display: block;
      font-size: 22px;
      color: #355c4b;
    }

    .box span {
      font-size: 12px;
      color: #7f756c;
    }

    .btn {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      background: #355c4b;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="envelope" id="envelope" onclick="openCard()">
      <div class="top"></div>
      <div class="letter"></div>
      <div class="seal">B&F</div>
    </div>
    <div class="note">Zarfı açmak için tıkla</div>

    <div class="card" id="card">
      <h1>Busenur & Furkan</h1>
      <div class="sub">Düğün Daveti</div>
      <p>Bu özel günümüzde mutluluğumuzu sizinle paylaşmaktan onur duyarız.</p>

      <div class="details">
        <div><strong>Tarih:</strong> 15 Haziran 2026</div>
        <div><strong>Saat:</strong> 19:30</div>
        <div><strong>Mekan:</strong> Liva Davet Salonu, Ankara</div>
      </div>

      <div class="countdown">
        <div class="box"><strong id="days">0</strong><span>Gün</span></div>
        <div class="box"><strong id="hours">0</strong><span>Saat</span></div>
        <div class="box"><strong id="minutes">0</strong><span>Dakika</span></div>
        <div class="box"><strong id="seconds">0</strong><span>Saniye</span></div>
      </div>

      <a class="btn" href="https://maps.google.com/?q=Liva+Davet+Salonu+Ankara" target="_blank">Konuma Git</a>
    </div>
  </div>

  <script>
    function openCard() {
      const envelope = document.getElementById("envelope");
      const card = document.getElementById("card");
      envelope.classList.add("open");

      setTimeout(() => {
        card.classList.add("show");
      }, 900);
    }

    const weddingDate = new Date(2026, 5, 15, 19, 30, 0).getTime();

    function updateCountdown() {
      const now = Date.now();
      const diff = weddingDate - now;

      if (diff <= 0) {
        document.getElementById("days").textContent = "0";
        document.getElementById("hours").textContent = "00";
        document.getElementById("minutes").textContent = "00";
        document.getElementById("seconds").textContent = "00";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("days").textContent = String(days);
      document.getElementById("hours").textContent = String(hours).padStart(2, "0");
      document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
      document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
